version: '3.8'

services:
  memorybridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: memorybridge-ai
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - LOG_LEVEL=INFO
      - LOG_CONSOLE_MODE=B
    volumes:
      # Persist memory and data files
      - ./memory_index.faiss:/app/memory_index.faiss
      - ./prem_knowledge_base.json:/app/prem_knowledge_base.json
      - ./memory_log.json:/app/memory_log.json
      - ./generated_audio:/app/generated_audio
      - ./voice_samples:/app/voice_samples
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - memorybridge-network

  # Optional: Ollama service for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: memorybridge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - memorybridge-network
    profiles:
      - ollama  # Optional service - use with: docker-compose --profile ollama up

networks:
  memorybridge-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
