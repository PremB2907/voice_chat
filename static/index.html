<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>UN-MISS AI · Prem</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="frontend/style.css"/>
<!-- Three.js Setup will be loaded in app.js via ES modules -->
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-name">UN<span>-</span>MISS <span>AI</span></div>
      <div class="brand-sub">Prem&nbsp;·&nbsp;Always Here</div>
    </div>
    <div class="header-right">
      <!-- Persona Data Ingestion button -->
      <a href="/step1.html" class="hdr-btn" title="Personal Data Ingestion" style="text-decoration:none; font-size:9px; font-weight:700; letter-spacing:1px; width:auto; padding: 0 10px;">PERSONA DATA</a>
      <div class="status-chip">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Connecting…</span>
      </div>
      <button class="hdr-btn" id="theme-toggle" title="Toggle Light/Dark" aria-label="Toggle theme">☀</button>
      <button class="hdr-btn" id="voice-toggle" title="Toggle Voice" aria-label="Toggle Voice">🔊</button>
      <button class="hdr-btn" id="clear-btn"    title="Clear chat"  aria-label="Clear chat">✕</button>
      <button class="hdr-btn" id="shutdown-btn" title="Stop Server" aria-label="Stop Server" style="color: #FF1744; border-color: #FF1744;">⏻</button>
    </div>
  </header>

  <!-- ACCENT BAR -->
  <div class="accent-bar"></div>

  <!-- MAIN AREA -->
  <div class="chat-wrap">
    
    <!-- ETHICAL DISCLAIMER -->
    <div style="position: absolute; top: 10px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; z-index: 10; pointer-events: none;">
      MemoryBridge is a digital imitation simulating responses. It possesses no consciousness or autonomous agency.
    </div>

    <!-- 3D AVATAR -->
    <div class="avatar-view" id="avatar-view">
      <div id="three-canvas-container" style="width: 100%; height: 100%;"></div>
      <div class="avatar-hint">Prem · 3D Avatar</div>
    </div>

    <!-- CHAT -->
    <div class="chat-container" id="chat-box" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <div class="empty-mandala">
          <div class="mandala-ring"></div>
          <div class="mandala-ring"></div>
          <div class="mandala-ring"></div>
          <div class="mandala-center">MB</div>
        </div>
        <div class="empty-title">Un-Miss</div>
        <div class="empty-msg">
          Say something to Prem <span class="blink-cursor"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- WAVE BAR -->
  <div class="wave-bar" id="wave-bar">
    <div class="wv-bars">
      <div class="wvb"></div><div class="wvb"></div><div class="wvb"></div>
      <div class="wvb"></div><div class="wvb"></div><div class="wvb"></div>
      <div class="wvb"></div>
    </div>
    <span class="wv-label">Generating</span>
    <span class="wv-timer" id="wave-timer">0s</span>
  </div>

  <!-- INPUT -->
  <div class="input-area" id="input-area">
    <div class="inp-prefix">&gt;_</div>
    <input
      type="text" id="user-input"
      placeholder="Talk to Prem..."
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      enterkeyhint="send"
      inputmode="text"
    />
    <button id="mic-btn" title="Voice Input" aria-label="Voice Input">🎤</button>
    <button id="send-btn"><span>SEND</span></button>
  </div>

</div>

<!-- AUDIO PILL -->
<div class="audio-pill" id="audio-pill">
  <div class="ap-bars">
    <div class="apb"></div><div class="apb"></div><div class="apb"></div>
    <div class="apb"></div><div class="apb"></div>
  </div>
  PLAYING
  <button id="stop-audio-btn" title="Stop" aria-label="Stop audio" style="background:transparent;border:none;color:inherit;cursor:pointer;margin-left:4px;font-size:11px;font-weight:700;">✕</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
<script type="module" src="frontend/app.js" defer></script>
</body>
</html>
