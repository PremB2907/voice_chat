<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>UN-MISS AI · Prem</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;500;600;700&family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="frontend/style.css"/>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-name">UN<span>-</span>MISS <span>AI</span></div>
      <div class="brand-sub">Prem &nbsp;·&nbsp; Always Here</div>
    </div>
    <div class="header-right">
      <a href="/step1.html" class="hdr-btn" title="Step 1: Personality Test" style="text-decoration:none; font-weight:bold; font-size:14px; margin-right:4px;">S1</a>
      <a href="/step2.html" class="hdr-btn" title="Step 2: 3D Avatar" style="text-decoration:none; font-weight:bold; font-size:14px; margin-right:12px;">S2</a>
      <div class="status-chip">
        <div class="status-dot"></div>
        <span class="status-text">XTTS v2</span>
      </div>
      <button class="hdr-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">☀</button>
      <button class="hdr-btn" id="clear-btn"  title="Clear chat"   aria-label="Clear chat">✕</button>
      <button class="hdr-btn" id="shutdown-btn" title="Stop Server" aria-label="Stop Server" style="color: #ff4444; font-weight: bold;">⏻</button>
    </div>
    <!-- Nothing glyph strip -->
    <div class="glyph-strip">
      <div class="glyph-dot"></div><div class="glyph-dot"></div>
      <div class="glyph-dot"></div><div class="glyph-dot"></div>
      <div class="glyph-dot"></div><div class="glyph-dot"></div>
      <div class="glyph-dot"></div><div class="glyph-dot"></div>
      <div class="glyph-dot"></div><div class="glyph-dot"></div>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div class="chat-container" id="chat-box" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <div class="empty-mandala">
          <div class="mandala-ring"></div>
          <div class="mandala-ring"></div>
          <div class="mandala-ring"></div>
          <div class="mandala-center">MB</div>
        </div>
        <div class="empty-title">Un-Miss</div>
        <div class="empty-msg">
          Say something to Prem <span class="blink-cursor"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- WAVE BAR -->
  <div class="wave-bar" id="wave-bar">
    <div class="wv-bars">
      <div class="wvb"></div><div class="wvb"></div><div class="wvb"></div>
      <div class="wvb"></div><div class="wvb"></div><div class="wvb"></div>
      <div class="wvb"></div>
    </div>
    <span class="wv-label">Generating</span>
    <span class="wv-timer" id="wave-timer">0s</span>
  </div>

  <!-- INPUT -->
  <div class="input-area" id="input-area">
    <div class="inp-prefix">&gt;_</div>
    <input
      type="text" id="user-input"
      placeholder="Talk to Prem..."
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      enterkeyhint="send"
      inputmode="text"
    />
    <button id="mic-btn" title="Voice Input" aria-label="Voice Input">🎤</button>
    <button id="send-btn"><span>SEND</span></button>
  </div>

</div>

<!-- AUDIO PILL -->
<div class="audio-pill" id="audio-pill">
  <div class="ap-bars">
    <div class="apb"></div><div class="apb"></div><div class="apb"></div>
    <div class="apb"></div><div class="apb"></div>
  </div>
  PLAYING
  <button id="stop-audio-btn" title="Stop Playback" aria-label="Stop Playback" style="background:transparent;border:none;color:inherit;cursor:pointer;margin-left:4px;font-size:10px;">✕</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script src="frontend/app.js" defer></script>
</body>
</html>
