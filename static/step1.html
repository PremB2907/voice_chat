<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Setup · UN-MISS AI</title>
    <link rel="stylesheet" href="frontend/presentation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: var(--white);
            border: 3px solid var(--black);
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            color: var(--black);
            font-weight: 600;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .save-btn {
            background: var(--black);
            color: var(--yellow);
            border: none;
            padding: 16px 24px;
            font-size: 20px;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 var(--white);
        }
        .scrollable-left {
            overflow-y: auto;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div class="slide-wrapper">
        
        <!-- LEFT PANE -->
        <div class="left-pane bg-yellow scrollable-left">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                <div class="step-label">STEP 01 — PERSONA SETUP</div>
                <a href="/" style="font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:#0a0a0a; text-decoration:none; border:2px solid #0a0a0a; padding:6px 12px; letter-spacing:2px;">← BACK TO CHAT</a>
            </div>
            
            <h1 class="title-huge" style="font-size: 60px; margin-bottom: 20px;">PERSONA<br>INGESTION</h1>
            
            <div class="text-reason" style="margin-bottom: 25px; font-size: 14px;">
                Calibrate the AI persona by providing memories and context.<br>
                The more details you provide, the more realistic the response.
            </div>
            
            <form id="persona-form">
                <div class="form-group">
                    <label>MBTI PERSONALITY</label>
                    <select id="mbti-input">
                        <option value="INFJ">INFJ (Advocate - warm, insightful)</option>
                        <option value="ENTP">ENTP (Debater - witty, clever)</option>
                        <option value="ISFP">ISFP (Adventurer - gentle, artistic)</option>
                        <option value="ESTJ">ESTJ (Executive - direct, caring but firm)</option>
                        <option value="ESFP">ESFP (Entertainer - energetic, loving)</option>
                        <option value="INTP">INTP (Logician - philosophical, quiet)</option>
                        <option value="ENFJ">ENFJ (Protagonist - charismatic, inspiring)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>RELATIONSHIP TO YOU</label>
                    <input type="text" id="rel-input" placeholder="e.g. Husband, Brother, Best Friend" required>
                </div>
                
                <div class="form-group">
                    <label>FAVORITE MEMORY</label>
                    <textarea id="memory-input" placeholder="e.g. That time we got lost in Kyoto..."></textarea>
                </div>

                <div class="form-group">
                    <label>CATCHPHRASES & QUIRKS</label>
                    <textarea id="quirks-input" placeholder="e.g. Always said 'Right on!', used a lot of puns..."></textarea>
                </div>

                <div class="form-group">
                    <label>OTHER CONTEXT (RAW DATA DUMP)</label>
                    <textarea id="other-input" placeholder="Paste chat histories, emails, or deeply personal info here..."></textarea>
                </div>
                <div class="form-group" style="display: flex; align-items: start; gap: 10px; background: rgba(0,0,0,0.05); padding: 15px; border: 2px solid var(--black);">
                    <input type="checkbox" id="consent-check" required style="width: 20px; height: 20px; margin-top: 2px; cursor: pointer;">
                    <label for="consent-check" style="font-size: 12px; font-weight: 500; margin: 0; line-height: 1.4;">
                        <strong>LEGAL ACKNOWLEDGEMENT:</strong> I understand that MemoryBridge creates a "Digital Imitation" and not a digital personality. The system possesses no subjectivity, consciousness, or autonomous agency.
                    </label>
                </div>
                
                <button type="submit" class="save-btn">SAVE & CONTINUE ➔</button>
            </form>
        </div>

        <!-- RIGHT PANE -->
        <div class="right-pane bg-black">
            <div class="rp-text yellow huge" style="font-size: 50px;">DATA<br>UPLOAD</div>
            <div class="divider"></div>
            <div class="rp-text white large" style="font-size: 30px;">BUILD<br>THE<br>SOUL</div>
            <div class="divider"></div>
            <div class="rp-text yellow medium" id="status-text" style="letter-spacing: 2px; font-size:20px;">WAITING...</div>
        </div>
        
    </div>

    <script>
        // Load existing
        document.getElementById('mbti-input').value = localStorage.getItem('mbti') || 'INFJ';
        document.getElementById('rel-input').value = localStorage.getItem('rel_context') || '';
        document.getElementById('memory-input').value = localStorage.getItem('mem_context') || '';
        document.getElementById('quirks-input').value = localStorage.getItem('quirks_context') || '';
        document.getElementById('other-input').value = localStorage.getItem('other_context') || '';

        document.getElementById('persona-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mbti = document.getElementById('mbti-input').value;
            const rel = document.getElementById('rel-input').value;
            const mem = document.getElementById('memory-input').value;
            const quirks = document.getElementById('quirks-input').value;
            const other = document.getElementById('other-input').value;

            // Save raw data to localStorage
            localStorage.setItem('mbti', mbti);
            localStorage.setItem('rel_context', rel);
            localStorage.setItem('mem_context', mem);
            localStorage.setItem('quirks_context', quirks);
            localStorage.setItem('other_context', other);

            // Compile into customContext for legacy support
            const compiledContext = `
Relationship: ${rel}
Favorite Memories: ${mem}
Catchphrases or Quirks: ${quirks}
Additional Chat/Background Info: ${other}
            `.trim();
            localStorage.setItem('customContext', compiledContext);

            // NEW: Send facts to server's knowledge base
            document.getElementById('status-text').innerText = 'UPLOADING TO PREM\'S SOUL...';
            try {
                const facts = [
                    { category: 'personality', detail: `Prem's MBTI type is ${mbti}` },
                    { category: 'relationship', detail: `Prem was ${rel} to Maitree` },
                ];
                
                if (mem && mem.trim()) {
                    facts.push({ category: 'memory', detail: mem });
                }
                if (quirks && quirks.trim()) {
                    facts.push({ category: 'personality', detail: `Prem's quirks: ${quirks}` });
                }
                if (other && other.trim()) {
                    facts.push({ category: 'memory', detail: other });
                }
                
                // Send each fact to server
                for (const fact of facts) {
                    await fetch('/add-fact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fact)
                    });
                }
                
                document.getElementById('status-text').innerText = 'PERSONA LOCKED IN ✓';
                document.getElementById('status-text').style.color = '#0f0';

                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (err) {
                console.error('Error uploading facts:', err);
                document.getElementById('status-text').innerText = 'ERROR UPLOADING';
                document.getElementById('status-text').style.color = '#f00';
            }
        });
    </script>
</body>
</html>
